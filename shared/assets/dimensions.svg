<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#fafafa"/>
  <!-- Motor outline - front view -->
  <rect x="100" y="40" width="200" height="180" rx="6" fill="#ddd" stroke="#555" stroke-width="2"/>
  <!-- Stator -->
  <circle cx="200" cy="130" r="75" fill="#bbb" stroke="#555" stroke-width="2"/>
  <!-- Rotor -->
  <circle cx="200" cy="130" r="45" fill="#999" stroke="#555" stroke-width="1.5"/>
  <!-- Shaft center -->
  <circle cx="200" cy="130" r="12" fill="#777" stroke="#444" stroke-width="1.5"/>
  <!-- Mounting holes -->
  <circle cx="120" cy="235" r="8" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="280" cy="235" r="8" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="90" y="220" width="220" height="25" rx="3" fill="#ccc" stroke="#555" stroke-width="2"/>
  <!-- Dimension: width -->
  <line x1="100" y1="270" x2="300" y2="270" stroke="#e74c3c" stroke-width="1"/>
  <line x1="100" y1="265" x2="100" y2="275" stroke="#e74c3c" stroke-width="1"/>
  <line x1="300" y1="265" x2="300" y2="275" stroke="#e74c3c" stroke-width="1"/>
  <text x="200" y="285" text-anchor="middle" font-size="11" fill="#e74c3c">242 mm</text>
  <!-- Dimension: height -->
  <line x1="330" y1="40" x2="330" y2="245" stroke="#2980b9" stroke-width="1"/>
  <line x1="325" y1="40" x2="335" y2="40" stroke="#2980b9" stroke-width="1"/>
  <line x1="325" y1="245" x2="335" y2="245" stroke="#2980b9" stroke-width="1"/>
  <text x="360" y="145" font-size="11" fill="#2980b9" transform="rotate(90,360,145)">265 mm</text>
  <!-- Dimension: shaft height -->
  <line x1="50" y1="130" x2="50" y2="245" stroke="#27ae60" stroke-width="1"/>
  <line x1="45" y1="130" x2="55" y2="130" stroke="#27ae60" stroke-width="1"/>
  <line x1="45" y1="245" x2="55" y2="245" stroke="#27ae60" stroke-width="1"/>
  <text x="40" y="195" font-size="10" fill="#27ae60" transform="rotate(-90,40,195)">132 mm (H)</text>
  <!-- Labels -->
  <text x="200" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">安装尺寸图 - 前视图</text>
</svg>
