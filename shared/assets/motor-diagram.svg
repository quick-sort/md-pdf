<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7b8d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d4f5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shaftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b0b0b0" />
      <stop offset="100%" style="stop-color:#808080" />
    </linearGradient>
  </defs>
  <!-- Motor body -->
  <rect x="80" y="50" width="200" height="150" rx="8" fill="url(#bodyGrad)" stroke="#2c3e50" stroke-width="2"/>
  <!-- Cooling fins -->
  <line x1="90" y1="55" x2="90" y2="195" stroke="#5a6a7a" stroke-width="1.5"/>
  <line x1="110" y1="55" x2="110" y2="195" stroke="#5a6a7a" stroke-width="1.5"/>
  <line x1="130" y1="55" x2="130" y2="195" stroke="#5a6a7a" stroke-width="1.5"/>
  <line x1="150" y1="55" x2="150" y2="195" stroke="#5a6a7a" stroke-width="1.5"/>
  <line x1="170" y1="55" x2="170" y2="195" stroke="#5a6a7a" stroke-width="1.5"/>
  <!-- End bell -->
  <rect x="280" y="60" width="30" height="130" rx="4" fill="#4a5a6a" stroke="#2c3e50" stroke-width="2"/>
  <!-- Shaft -->
  <rect x="310" y="110" width="80" height="30" rx="2" fill="url(#shaftGrad)" stroke="#666" stroke-width="1.5"/>
  <!-- Mounting base -->
  <rect x="70" y="200" width="250" height="20" rx="3" fill="#4a5a6a" stroke="#2c3e50" stroke-width="2"/>
  <rect x="60" y="215" width="30" height="15" rx="2" fill="#3d4f5f" stroke="#2c3e50" stroke-width="1"/>
  <rect x="280" y="215" width="30" height="15" rx="2" fill="#3d4f5f" stroke="#2c3e50" stroke-width="1"/>
  <!-- Terminal box -->
  <rect x="130" y="25" width="60" height="30" rx="3" fill="#5a6a7a" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="145" cy="35" r="4" fill="#333"/>
  <circle cx="160" cy="35" r="4" fill="#333"/>
  <circle cx="175" cy="35" r="4" fill="#333"/>
  <!-- Nameplate -->
  <rect x="190" y="100" width="80" height="50" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="230" y="118" text-anchor="middle" font-size="8" font-family="Arial" fill="#333">DM-4000</text>
  <text x="230" y="130" text-anchor="middle" font-size="6" font-family="Arial" fill="#666">7.5 kW</text>
  <text x="230" y="140" text-anchor="middle" font-size="6" font-family="Arial" fill="#666">1450 rpm</text>
  <!-- Dimension lines -->
  <line x1="80" y1="240" x2="310" y2="240" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="195" y="252" text-anchor="middle" font-size="10" fill="#e74c3c">365 mm</text>
</svg>
