<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <!-- Background grid -->
  <rect width="500" height="300" fill="#fafafa"/>
  <g stroke="#e0e0e0" stroke-width="0.5">
    <line x1="60" y1="20" x2="60" y2="260"/><line x1="120" y1="20" x2="120" y2="260"/>
    <line x1="180" y1="20" x2="180" y2="260"/><line x1="240" y1="20" x2="240" y2="260"/>
    <line x1="300" y1="20" x2="300" y2="260"/><line x1="360" y1="20" x2="360" y2="260"/>
    <line x1="420" y1="20" x2="420" y2="260"/><line x1="480" y1="20" x2="480" y2="260"/>
    <line x1="60" y1="60" x2="480" y2="60"/><line x1="60" y1="100" x2="480" y2="100"/>
    <line x1="60" y1="140" x2="480" y2="140"/><line x1="60" y1="180" x2="480" y2="180"/>
    <line x1="60" y1="220" x2="480" y2="220"/>
  </g>
  <!-- Axes -->
  <line x1="60" y1="260" x2="480" y2="260" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="20" x2="60" y2="260" stroke="#333" stroke-width="2"/>
  <!-- Torque curve (blue) -->
  <polyline points="60,240 120,220 180,180 240,130 300,90 360,70 420,80 480,120" fill="none" stroke="#2980b9" stroke-width="2.5"/>
  <!-- Efficiency curve (green) -->
  <polyline points="60,250 120,200 180,120 240,70 300,45 360,40 420,50 480,80" fill="none" stroke="#27ae60" stroke-width="2.5"/>
  <!-- Power curve (red) -->
  <polyline points="60,255 120,230 180,190 240,140 300,100 360,80 420,90 480,130" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
  <!-- Y-axis labels -->
  <text x="10" y="145" font-size="11" fill="#333" transform="rotate(-90,20,145)">性能参数</text>
  <text x="45" y="264" font-size="9" fill="#666">0</text>
  <text x="40" y="224" font-size="9" fill="#666">25</text>
  <text x="40" y="184" font-size="9" fill="#666">50</text>
  <text x="40" y="144" font-size="9" fill="#666">75</text>
  <text x="35" y="104" font-size="9" fill="#666">100</text>
  <!-- X-axis labels -->
  <text x="250" y="290" text-anchor="middle" font-size="11" fill="#333">转速 (rpm)</text>
  <text x="60" y="278" text-anchor="middle" font-size="9" fill="#666">0</text>
  <text x="180" y="278" text-anchor="middle" font-size="9" fill="#666">500</text>
  <text x="300" y="278" text-anchor="middle" font-size="9" fill="#666">1000</text>
  <text x="420" y="278" text-anchor="middle" font-size="9" fill="#666">1500</text>
  <!-- Legend -->
  <rect x="340" y="5" width="155" height="50" rx="3" fill="white" stroke="#ccc"/>
  <line x1="350" y1="17" x2="375" y2="17" stroke="#2980b9" stroke-width="2.5"/>
  <text x="380" y="21" font-size="10" fill="#333">扭矩 (N·m)</text>
  <line x1="350" y1="33" x2="375" y2="33" stroke="#27ae60" stroke-width="2.5"/>
  <text x="380" y="37" font-size="10" fill="#333">效率 (%)</text>
  <line x1="350" y1="49" x2="375" y2="49" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="380" y="53" font-size="10" fill="#333">功率 (kW)</text>
</svg>
